def isNewArchitectureEnabled() {
    return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"

if (isNewArchitectureEnabled()) {
    apply plugin: "com.facebook.react"
}

apply plugin: "kotlin-android"

def getExtOrDefault(name) {
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["AdropAdsReactNative_" + name]
}

def getExtOrIntegerDefault(name) {
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["AdropAdsReactNative_" + name]).toInteger()
}

def supportsNamespace() {
    def parsed = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')
    def major = parsed[0].toInteger()
    def minor = parsed[1].toInteger()

    // Namespace support was added in 7.3.0
    return (major == 7 && minor >= 3) || major >= 8
}


android {
    if (supportsNamespace()) {
        namespace "io.adrop"

        sourceSets {
            main {
                manifest.srcFile "src/main/AndroidManifestNew.xml"
            }
        }
    }

    compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

    defaultConfig {
        minSdkVersion getExtOrIntegerDefault("minSdkVersion")
        targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    lintOptions {
        disable "GradleCompatible"
    }

    // RN 0.71-0.81: JVM 11, RN 0.82+: JVM 17
    def reactNativeVersion = 0
    try {
        def jsonSlurper = new groovy.json.JsonSlurper()
        def possiblePackageJsonFiles = [
            new File(rootProject.projectDir, "../node_modules/react-native/package.json"),
            new File(rootProject.projectDir, "node_modules/react-native/package.json"),
            new File(rootDir, "node_modules/react-native/package.json")
        ]
        def packageJsonFile = possiblePackageJsonFiles.find { it.exists() }
        if (packageJsonFile != null) {
            def packageJson = jsonSlurper.parseText(packageJsonFile.text)
            def versionParts = packageJson.version.split("\\.")
            if (versionParts.length >= 2) {
                reactNativeVersion = versionParts[1].replaceAll("[^0-9]", "").toInteger()
            }
        } else {
            println "[AdropAds] Warning: react-native package.json not found, defaulting to JVM 11"
        }
    } catch (Exception e) {
        println "[AdropAds] Warning: Could not detect React Native version, defaulting to JVM 11"
    }

    def javaVersion = reactNativeVersion >= 82 ? JavaVersion.VERSION_17 : JavaVersion.VERSION_11

    compileOptions {
        sourceCompatibility javaVersion
        targetCompatibility javaVersion
    }

    kotlinOptions {
        jvmTarget = javaVersion.majorVersion
    }
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"

    implementation "io.adrop:adrop-ads:[1.7.6, 1.8)"
}

